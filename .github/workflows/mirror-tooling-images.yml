name: "[Daily] Mirror Tooling Images to GHCR"

on:
  schedule:
    - cron: "0 3 * * *" # every day at 3 AM UTC
  workflow_dispatch:
    inputs:
      ghcr_namespace:
        description: "GHCR Namespace"
        required: true
        default: "ghcr.io/project-copacetic/copacetic"

env:
  GHCR_NAMESPACE: ${{ github.event.inputs.ghcr_namespace || 'ghcr.io/project-copacetic/copacetic' }}

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    strategy:
      matrix:
        images:
          - "mirror.gcr.io/debian:10-slim"
          - "mirror.gcr.io/debian:11-slim"
          - "mirror.gcr.io/debian:12-slim"
          - "mirror.gcr.io/debian:stable-slim"
          - "mirror.gcr.io/ubuntu:20.04"
          - "mirror.gcr.io/ubuntu:22.04"
          - "mcr.microsoft.com/azurelinux/base/core:3.0"
          - "mcr.microsoft.com/cbl-mariner/base/core:2.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull and push cache image
        env:
          SOURCE_IMAGE: ${{ matrix.images }}
        run: |
          if [[ "$SOURCE_IMAGE" == */* ]]; then
            # Image with registry hostname (strip hostname)
            TARGET_IMAGE=$(echo "$SOURCE_IMAGE" | sed 's#^[^/]*/##')
          else
            # Official library images (no registry hostname)
            TARGET_IMAGE="$SOURCE_IMAGE"
          fi

          echo "Processing image: $SOURCE_IMAGE -> $GHCR_NAMESPACE/$TARGET_IMAGE"

          docker pull "$SOURCE_IMAGE"
          docker tag "$SOURCE_IMAGE" "$GHCR_NAMESPACE/$TARGET_IMAGE"
          docker push "$GHCR_NAMESPACE/$TARGET_IMAGE"
