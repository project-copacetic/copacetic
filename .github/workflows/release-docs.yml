name: Create Docs PR
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.0' # run this workflow when a new minor version is published

permissions:
  contents: read

jobs:
  create-docs-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.3.1
        with:
          egress-policy: audit

      - name: Get version from tag
        shell: bash
        run: |
          TAG="$(echo "${{ github.ref }}" | tr -d 'refs/tags/v')"
          MAJOR_VERSION="$(echo "${TAG}" | cut -d '.' -f1)"
          MINOR_VERSION="$(echo "${TAG}" | cut -d '.' -f2)"
          echo "NEWVERSION=v${MAJOR_VERSION}.${MINOR_VERSION}.x" >> ${GITHUB_ENV}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Generate versioned docs
        shell: bash
        run: make version-docs

      - name: Create release pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore: Generate ${{ env.NEWVERSION }} docs"
          title: "chore: Generate ${{ env.NEWVERSION }} docs"
          branch: "release-${{ env.NEWVERSION }}"
          base: "main"
          signoff: true
